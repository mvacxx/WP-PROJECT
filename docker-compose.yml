version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wp-automation-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wp_automation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d wp_automation']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wp-automation-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: wp-automation-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/wp_automation
      REDIS_URL: redis://redis:6379
      API_PORT: 3001
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ['app']

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: wp-automation-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001/api/v1
    ports:
      - '3000:3000'
    depends_on:
      - api
    profiles: ['app']

volumes:
  postgres_data:
  redis_data:
